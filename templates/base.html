<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Alke Wallet{% endblock %}</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
  {% block extra_head %}{% endblock %}
</head>

<body>

  <!-- ── Navbar ── -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-wallet2 me-2"></i>Alke Wallet
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {% block nav_users %}{% endblock %}" href="{% url 'users:user_list' %}">
              <i class="bi bi-people me-1"></i>Usuarios
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_accounts %}{% endblock %}" href="{% url 'accounts:account_list' %}">
              <i class="bi bi-bank me-1"></i>Cuentas
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_transactions %}{% endblock %}"
              href="{% url 'transactions:transaction_list' %}">
              <i class="bi bi-arrow-left-right me-1"></i>Transacciones
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ── Main content ── -->
  <main class="container py-4">

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ── -->
  <footer class="bg-light border-top py-3 mt-auto">
    <div class="container text-center text-muted small">
      &copy; 2026 Alke Financial — ABP #7
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>

</html>
