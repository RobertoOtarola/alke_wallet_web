{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{{ title }} — Alke Wallet{% endblock %}
{% block nav_users %}active{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'users:user_list' %}">Usuarios</a></li>
    <li class="breadcrumb-item active">{{ title }}</li>
  </ol>
</nav>

<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header">
        <h2 class="h5 mb-0">
          <i class="bi bi-person me-2 text-primary"></i>{{ title }}
        </h2>
      </div>
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Guardar
            </button>
            <a href="{% url 'users:user_list' %}" class="btn btn-secondary">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
